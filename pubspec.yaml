name: elmogps
description: "ELMO - Smart Fleet Intelligence Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP client
  dio: ^5.4.3

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # Local preferences
  shared_preferences: ^2.2.3

  # Date / number formatting
  intl: ^0.19.0

  # Maps
  google_maps_flutter: ^2.6.1

  # Connectivity
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config/
